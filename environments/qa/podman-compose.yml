# QA/Staging Environment - Supabase Stack with Public Access
# Access: Public URL with SSL
# Usage: cd environments/qa && podman-compose up -d

version: "3.8"

services:
  # Nginx Reverse Proxy with SSL
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:z
      - ${SSL_CERT_PATH:-/etc/letsencrypt/live/qa.yourdomain.com/fullchain.pem}:/etc/ssl/certs/fullchain.pem:z
      - ${SSL_KEY_PATH:-/etc/letsencrypt/live/qa.yourdomain.com/privkey.pem}:/etc/ssl/private/privkey.pem:z
    depends_on:
      - frontend
      - supabase-kong
    networks:
      - supabase-network
    restart: unless-stopped

  # Frontend Application (Production Build)
  frontend:
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-https://api.qa.yourdomain.com}
        VITE_SUPABASE_ANON_KEY: ${ANON_KEY}
        VITE_SUPABASE_PROJECT_ID: qa
        VITE_ENVIRONMENT: staging
        VITE_ENABLE_EMAIL_AUTH: ${VITE_ENABLE_EMAIL_AUTH:-false}
    networks:
      - supabase-network
    restart: unless-stopped

  # PostgreSQL Database
  supabase-db:
    image: supabase/postgres:15.1.1.41
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXP: 3600
    volumes:
      - supabase-db-data:/var/lib/postgresql/data:Z
      - ../../supabase/migrations:/docker-entrypoint-initdb.d/migrations:z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - supabase-network
    restart: unless-stopped

  # GoTrue - Authentication
  supabase-auth:
    image: supabase/gotrue:v2.143.0
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${VITE_SUPABASE_URL:-https://api.qa.yourdomain.com}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@supabase-db:5432/${POSTGRES_DB:-postgres}
      GOTRUE_SITE_URL: ${SITE_URL:-https://qa.yourdomain.com}
      GOTRUE_URI_ALLOW_LIST: "${SITE_URL:-https://qa.yourdomain.com}/**"
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "false"
      GOTRUE_SMTP_HOST: ${SMTP_HOST:-}
      GOTRUE_SMTP_PORT: ${SMTP_PORT:-587}
      GOTRUE_SMTP_USER: ${SMTP_USER:-}
      GOTRUE_SMTP_PASS: ${SMTP_PASS:-}
      GOTRUE_SMTP_ADMIN_EMAIL: ${SMTP_ADMIN_EMAIL:-noreply@qa.yourdomain.com}
      GOTRUE_EXTERNAL_GOOGLE_ENABLED: ${GOOGLE_AUTH_ENABLED:-true}
      GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOTRUE_EXTERNAL_GOOGLE_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOTRUE_EXTERNAL_GOOGLE_REDIRECT_URI: ${VITE_SUPABASE_URL:-https://api.qa.yourdomain.com}/auth/v1/callback
    depends_on:
      supabase-db:
        condition: service_healthy
    networks:
      - supabase-network
    restart: unless-stopped

  # PostgREST - REST API
  supabase-rest:
    image: postgrest/postgrest:v12.0.2
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@supabase-db:5432/${POSTGRES_DB:-postgres}
      PGRST_DB_SCHEMAS: public,storage,graphql_public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: 3600
    depends_on:
      supabase-db:
        condition: service_healthy
    networks:
      - supabase-network
    restart: unless-stopped

  # Realtime - Websocket subscriptions
  supabase-realtime:
    image: supabase/realtime:v2.27.5
    environment:
      PORT: 4000
      DB_HOST: supabase-db
      DB_PORT: 5432
      DB_USER: supabase_admin
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-postgres}
      DB_AFTER_CONNECT_QUERY: 'SET search_path TO _realtime'
      DB_ENC_KEY: supabaserealtime
      API_JWT_SECRET: ${JWT_SECRET}
      SECRET_KEY_BASE: ${JWT_SECRET}
      ERL_AFLAGS: -proto_dist inet_tcp
      ENABLE_TAILSCALE: "false"
      DNS_NODES: "''"
    depends_on:
      supabase-db:
        condition: service_healthy
    networks:
      - supabase-network
    restart: unless-stopped

  # Storage API
  supabase-storage:
    image: supabase/storage-api:v0.46.4
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      PROJECT_REF: qa
      REGION: local
      TENANT_ID: stub
      POSTGREST_URL: http://supabase-rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://supabase_storage_admin:${POSTGRES_PASSWORD}@supabase-db:5432/${POSTGRES_DB:-postgres}
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      ENABLE_IMAGE_TRANSFORMATION: "true"
      IMGPROXY_URL: http://supabase-imgproxy:8080
    volumes:
      - supabase-storage-data:/var/lib/storage:Z
    depends_on:
      supabase-db:
        condition: service_healthy
      supabase-rest:
        condition: service_started
    networks:
      - supabase-network
    restart: unless-stopped

  # Image Proxy
  supabase-imgproxy:
    image: darthsim/imgproxy:v3.18
    environment:
      IMGPROXY_BIND: ":8080"
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: /
      IMGPROXY_USE_ETAG: "true"
    volumes:
      - supabase-storage-data:/var/lib/storage:Z
    networks:
      - supabase-network
    restart: unless-stopped

  # Kong - API Gateway
  supabase-kong:
    image: kong:2.8.1
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
    volumes:
      - ../../supabase/kong.yml:/var/lib/kong/kong.yml:z
    depends_on:
      - supabase-auth
      - supabase-rest
      - supabase-realtime
      - supabase-storage
    networks:
      - supabase-network
    restart: unless-stopped

  # Postgres Meta - Database metadata
  supabase-meta:
    image: supabase/postgres-meta:v0.77.2
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: supabase-db
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: ${POSTGRES_DB:-postgres}
      PG_META_DB_USER: supabase_admin
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      supabase-db:
        condition: service_healthy
    networks:
      - supabase-network
    restart: unless-stopped

  # Edge Functions Runtime
  supabase-edge-functions:
    image: supabase/edge-runtime:v1.36.1
    environment:
      JWT_SECRET: ${JWT_SECRET}
      SUPABASE_URL: http://supabase-kong:8000
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      SUPABASE_DB_URL: postgres://postgres:${POSTGRES_PASSWORD}@supabase-db:5432/${POSTGRES_DB:-postgres}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      MAKE_GOOGLE_EMAIL: ${MAKE_GOOGLE_EMAIL:-}
    volumes:
      - ../../supabase/functions:/home/deno/functions:z
    depends_on:
      - supabase-kong
    networks:
      - supabase-network
    restart: unless-stopped

volumes:
  supabase-db-data:
  supabase-storage-data:

networks:
  supabase-network:
    driver: bridge
